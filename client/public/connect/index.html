<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>SIM XR · Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0F1A;
    --ink: #E6EAF0;
    --muted: #8B93A1;
    --line: rgba(255,255,255,0.08);
    --accent: #0057FF;
    --accent-light: #4D80FF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    min-height: 100vh;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 20px;
  }
  header { display: flex; align-items: baseline; gap: 0.6rem; }
  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .wordmark .accent { color: var(--accent-light); }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    max-width: 540px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 0;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--ink);
  }
  p {
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--muted);
    margin: 0;
    max-width: 420px;
  }
  footer {
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0.75;
    text-align: center;
  }
</style>
</head>
<body>
  <header>
    <span class="wordmark">SIM <span class="accent">XR.</span></span>
    <span class="subtitle">/&nbsp;CONNECT</span>
  </header>
  <main>
    <div class="eyebrow">Idle</div>
    <h1>No active session.</h1>
    <p>This page is updated automatically before a live VR demo. Come back when one's running.</p>
  </main>
  <footer>SESSION OFFLINE</footer>
</body>
</html>
