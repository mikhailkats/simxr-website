# SIM XR website — Netlify build config
# We bypass `pnpm build` (which also runs esbuild on the unused tRPC server
# bundle) and call vite directly, but we need the scenes-fallback prebuild
# step that converts client/public/connect/scenes.yaml → scenes.json so the
# Connect page can render the catalog when api.simxr.app is offline. The
# prebuild runs first; vite then copies dist/public/connect/scenes.json
# verbatim (anything in client/public/ ships to dist/public/).
# Output goes to dist/public/, which is the Vite default for this project.

[build]
  command = "pnpm run build:scenes-fallback && pnpm vite build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.4.1"
  # Netlify auto-detects pnpm from packageManager field in package.json,
  # but pinning it here avoids surprise upgrades.

# Disable Pretty-URL .html stripping. Default Netlify behavior strips
# `.html` from links and form actions, which breaks Netlify Forms
# success-page redirects (Netlify's form handler can't match the
# stripped path back to the file and falls through to its default
# "Thank you!" page). The React SPA doesn't use .html URLs anyway,
# so disabling site-wide is harmless. Required for /operator/ form
# to land on our custom thanks.html.
[build.processing.html]
  pretty_urls = false

# /operator/thanks — explicit rewrite to thanks.html. Form action in
# operator/index.html is "/operator/thanks" (no extension) so Netlify's
# HTML post-processing can't strip it and break the success-page redirect.
# This rule makes the extensionless path resolve to the actual file.
[[redirects]]
  from = "/operator/thanks"
  to = "/operator/thanks.html"
  status = 200

# /operator-v2/* — graceful 301 to the now-promoted /operator/.
# operator-v2 was the staging path while we A/B-tested; v2 became the main
# operator page on 2026-04-30. Keeps any old shared links working.
[[redirects]]
  from = "/operator-v2/*"
  to = "/operator/:splat"
  status = 301
  force = true

# Apex routing for simxr.app is handled in React (App.tsx isAppDomain check) —
# `simxr.app/` renders the Connect component directly, no redirect needed.
# `simxr.tech/` continues to render Home.

# /connect-classic — v1 multi-scene picker (legacy fallback). Static file at
# client/public/connect-classic/index.html, generated by update_connect_page.sh.
# Trailing-slash redirect so /connect-classic resolves to the directory's index.
[[redirects]]
  from = "/connect-classic"
  to = "/connect-classic/"
  status = 301

# /client/* — proxy to NVIDIA's IsaacTeleop client. ONLY needed by the v1
# fallback at /connect-classic; the v1.5 React route at /connect doesn't use
# this path. Drop this redirect rule once /connect-classic is retired
# (~1 week after v1.5 ship is verified stable on Quest 3 + AVP).
[[redirects]]
  from = "/client/*"
  to = "https://nvidia.github.io/IsaacTeleop/client/:splat"
  status = 200
  force = true

# SPA fallback — wouter is client-side routed; any unknown path
# should serve index.html so React handles 404 / deep-link routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# /connect and /connect-classic — noindex/nofollow headers.
# Both are internal-team / shared-link-only; no search-engine indexing.
[[headers]]
  for = "/connect"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/connect-classic/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache busting headers — Vite emits hashed filenames in /assets/
# so they're safe to cache aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Forms detection runs against the published HTML; the hidden
# <form name="early-access" netlify> + <form name="collaboration" netlify>
# in client/index.html register them at build time. Submissions land in
# the Netlify dashboard under "Forms".
